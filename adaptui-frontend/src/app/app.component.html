

<mat-toolbar color="primary">
  <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
    <mat-icon>menu</mat-icon>
  </button>
  <span>AdaptUI 3.0 Web IDE</span>
  <span class="example-spacer"></span>
  <button mat-icon-button class="example-icon favorite-icon" aria-label="Example icon-button with heart icon">
    <mat-icon>favorite</mat-icon>
  </button>
  <button mat-icon-button class="example-icon" aria-label="Example icon-button with share icon">
    <mat-icon>share</mat-icon>
  </button>
</mat-toolbar>

<div class="project-bar">
  <span class="pb-title">Project</span>
  <input class="pb-name" type="text" [(ngModel)]="projectName" placeholder="Project name" aria-label="Project name">
  <button class="pb-btn" (click)="saveProject()">Save</button>
  <button class="pb-btn" (click)="newProject()">New</button>
  <span class="pb-spacer"></span>
  <label class="pb-open">Open
    <select class="pb-select" [(ngModel)]="selectedOpen" (ngModelChange)="openProject($event)">
      <option value="">{{ savedNames.length ? 'Choose a saved project…' : 'No saved projects yet' }}</option>
      <option *ngFor="let n of savedNames" [value]="n">{{ n }}</option>
    </select>
  </label>
  <button class="pb-btn pb-del" *ngIf="savedNames.indexOf(projectName) >= 0" (click)="deleteProject(projectName)">Delete</button>
</div>

<mat-tab-group id="mainViewSelect">
  <mat-tab label="IFML"> <app-tiny-ifml></app-tiny-ifml> </mat-tab>
  <mat-tab label="STYLE"> <app-style-ml></app-style-ml> </mat-tab>
  <mat-tab label="CONTEXTML"> <app-context-ml></app-context-ml> </mat-tab>
  <mat-tab label="OPERATIONS"> <app-operation-ml></app-operation-ml> </mat-tab>
  <mat-tab label="CODE"> <app-code></app-code> </mat-tab>
  <mat-tab label="ADAPTML"> <app-adapt-ml></app-adapt-ml> </mat-tab>
  <mat-tab label="PREVIEW"> <app-preview></app-preview> </mat-tab>
</mat-tab-group>
